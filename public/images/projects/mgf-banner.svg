<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" role="img" aria-label="Mirage Game Framework">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e0e13"/>
      <stop offset="1" stop-color="#16161d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1140 240) rotate(125) scale(760)">
      <stop stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- module constellation -->
  <g stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M800 250 L560 400 M800 250 L800 430 M800 250 L1040 400 M800 430 L560 400 M800 430 L1040 400 M560 400 L520 600 M800 430 L800 620"/>
  </g>
  <g fill="#a78bfa">
    <circle cx="800" cy="250" r="13"/>
    <circle cx="560" cy="400" r="9"/>
    <circle cx="1040" cy="400" r="9"/>
    <circle cx="800" cy="430" r="9"/>
    <circle cx="520" cy="600" r="7" fill="#7c6fb0"/>
    <circle cx="800" cy="620" r="7" fill="#7c6fb0"/>
  </g>

  <text x="100" y="730" fill="#fafafa" font-family="sans-serif" font-size="76" font-weight="700" letter-spacing="-2">Mirage Game Framework</text>
  <text x="104" y="792" fill="#a78bfa" font-family="monospace" font-size="30" letter-spacing="4">MODULAR · SERVER-AUTHORITATIVE · UE 5.7</text>
</svg>

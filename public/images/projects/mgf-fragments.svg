<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" role="img" aria-label="MGF fragment composition diagram">
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="#101016"/>
  <text x="80" y="80" fill="#fafafa" font-family="sans-serif" font-size="34" font-weight="700">Composition over inheritance</text>
  <text x="80" y="118" fill="#8b8b97" font-family="monospace" font-size="20">an item is composed from fragments — you never subclass it</text>

  <!-- item data asset -->
  <rect x="110" y="320" width="440" height="360" rx="16" fill="#1a1626" stroke="#8b5cf6" stroke-opacity="0.6"/>
  <text x="150" y="380" fill="#fafafa" font-family="sans-serif" font-size="28" font-weight="700">UMGF_ItemData</text>
  <text x="150" y="412" fill="#a78bfa" font-family="monospace" font-size="18">Data Asset</text>
  <rect x="150" y="448" width="360" height="196" rx="10" fill="#101016" stroke="#2c2c3a"/>
  <text x="172" y="486" fill="#8b8b97" font-family="monospace" font-size="18">ItemFragments[ ]</text>
  <g font-family="monospace" font-size="17" fill="#cdc7e0">
    <text x="186" y="528">▪ Stack</text>
    <text x="186" y="562">▪ Equip</text>
    <text x="186" y="596">▪ Use</text>
    <text x="186" y="630">▪ Firearm</text>
  </g>

  <!-- arrows -->
  <g stroke="#8b5cf6" stroke-width="2.5" stroke-opacity="0.85" fill="none">
    <path d="M550 430 L812 250" marker-end="url(#ah2)"/>
    <path d="M550 470 L812 420" marker-end="url(#ah2)"/>
    <path d="M550 530 L812 590" marker-end="url(#ah2)"/>
    <path d="M550 600 L812 760" marker-end="url(#ah2)"/>
  </g>

  <!-- fragment chips -->
  <g font-family="sans-serif">
    <g>
      <rect x="820" y="200" width="660" height="100" rx="12" fill="#181820" stroke="#2c2c3a"/>
      <text x="852" y="248" fill="#fafafa" font-size="23" font-weight="700">UMGF_ItemStackFragment</text>
      <text x="852" y="278" fill="#8b8b97" font-family="monospace" font-size="16">the item can stack</text>
    </g>
    <g>
      <rect x="820" y="370" width="660" height="100" rx="12" fill="#181820" stroke="#2c2c3a"/>
      <text x="852" y="418" fill="#fafafa" font-size="23" font-weight="700">UMGF_ItemEquipFragment</text>
      <text x="852" y="448" fill="#8b8b97" font-family="monospace" font-size="16">equippable into tag-based slots</text>
    </g>
    <g>
      <rect x="820" y="540" width="660" height="100" rx="12" fill="#181820" stroke="#2c2c3a"/>
      <text x="852" y="588" fill="#fafafa" font-size="23" font-weight="700">UMGF_ItemUseFragment</text>
      <text x="852" y="618" fill="#8b8b97" font-family="monospace" font-size="16">usable — activates a gameplay ability</text>
    </g>
    <g>
      <rect x="820" y="710" width="660" height="100" rx="12" fill="#181820" stroke="#2c2c3a"/>
      <text x="852" y="758" fill="#fafafa" font-size="23" font-weight="700">UMGF_ItemFirearmFragment</text>
      <text x="852" y="788" fill="#8b8b97" font-family="monospace" font-size="16">the item is a firearm</text>
    </g>
  </g>

  <text x="110" y="900" fill="#5c5c68" font-family="monospace" font-size="18">FindItemFragmentData&lt;T&gt;()  →  query a capability at runtime; one fragment = one concern</text>
</svg>
